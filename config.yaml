# =====================================================================
# config.yaml - Configuración del Proyecto Final CI/CD ML
# =====================================================================
# Centraliza hiperparámetros, rutas y umbrales para evitar valores
# hardcodeados en el código y facilitar reproducibilidad.
# =====================================================================

# ---------------------------------------------------------------------
# Datos
# ---------------------------------------------------------------------
# Dataset: Heart Failure Prediction Dataset (Kaggle - fedesoriano).
# Combina 5 datasets clínicos (Cleveland, Hungarian, Switzerland,
# Long Beach VA, Statlog) con 918 registros únicos y 11 features clínicas.
# Fuente: https://www.kaggle.com/datasets/fedesoriano/heart-failure-prediction
data:
  local_path: "data/heart.csv"
  target_column: "HeartDisease"
  test_size: 0.2
  random_state: 42

# ---------------------------------------------------------------------
# Preprocesamiento
# ---------------------------------------------------------------------
preprocessing:
  numeric_features:
    - "Age"
    - "RestingBP"
    - "Cholesterol"
    - "MaxHR"
    - "Oldpeak"
  categorical_features:
    - "Sex"
    - "ChestPainType"
    - "FastingBS"
    - "RestingECG"
    - "ExerciseAngina"
    - "ST_Slope"

# ---------------------------------------------------------------------
# Modelo (RandomForestClassifier)
# ---------------------------------------------------------------------
model:
  name: "RandomForestClassifier"
  params:
    n_estimators: 200
    max_depth: 8
    min_samples_split: 4
    random_state: 42
    n_jobs: -1

# ---------------------------------------------------------------------
# MLflow tracking
# ---------------------------------------------------------------------
mlflow:
  experiment_name: "heart-failure-cicd"
  tracking_dir: "mlruns"
  artifact_subpath: "model"

# ---------------------------------------------------------------------
# Umbrales mínimos de calidad para que las pruebas pasen
# ---------------------------------------------------------------------
validation:
  min_accuracy: 0.85
  min_f1: 0.85

# ---------------------------------------------------------------------
# Rutas de salida
# ---------------------------------------------------------------------
output:
  model_pkl: "model.pkl"
  metrics_json: "metrics.json"
